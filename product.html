<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
<style>
:root{
  --primary:#0A3D2A;
  --secondary:#C36A4F;
  --accent:#D4AF37;
  --neutral:#F8F4F0;
  --text:#1F1F1F;
  --border:#EDE9E4;
  --success:#2E8B57;
  --error:#B74F4F;
}
*{
  margin:0;
}
body{
  letter-spacing 0.5px;
  line height: 1.75;m
  font-family:'inter', sans-serif;
}
  header{
    display: flex;
    justify-content: space-between;
    align-content: center;
    border-bottom: var(--border) 1px solid;
    padding: 12px;
    background: var(--primary);
    position:sticky;
    top:0;
  }
  .brand{
    font-size: 32px;
    font-weight: 800;
    color: var(--secondary);
  }
  li{
    list-style-type: none;
    display: flex;
    margin-right:8px;
  }
  .num{
    background-color: var(--error);
    padding: 2px 4px;
    border-radius: 50%;
    text-align: center;
    align-self: center;
    color: #f5f5f5;
  }
  a{
    text-decoration: none;
    color: black;
  }
  h1{
    text-align: center;
    padding: 8px;
    color: var(--secondary);
  }
  #products{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:1rem;
    padding: 24px;
  }
  .product{
    padding: 16px;
    box-shadow: 6px 6px 6px #ddd;
    border-radius: 12px;
    border: 2px solid var(--border);
  }
  .p-name{
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    margin: 8px;
    color:var(--accent);
    padding: 8px;
  }
  .p-price{
    font-size: 24px;
    font-weight: 800;
    color:var(--error);
    text-align: center;
    margin-top: 10px;
  }
  .add-to-cart, .btn{
    padding: 10px 16px;
    border:none;
    border-radius: 12px;
    background:var(--primary);
    color:var(--neutral);
    display: block;
    font-size:22px;
    font-weight:600;
    width:90%;
    justify-self: center;
    margin:8px;
  }
  .p-img{
    width:120px;
    border-radius:12px;
  }
  .p-img-con{
    justify-content: center;
    display: flex;
  }
  .success-modal{
    background: var(--neutral);
    padding:24px;
    width:50%;
    transform: 0.2s ease;
    color:var(--text);
    border-radius: 12px;
    justify-content: center;
    justify-self: center;
    align-content: center;
    text-align: center;
    align-self: center;
    z-index:99;
    
  }
  .success-modal p{
    font-size:20px;
    font-weight: 600;
  }
  .success-modal-con{
    width:100%;
    height:100vh;
    position: fixed;
    top:0;
    z-index:9999;
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content:center;
    display: none;
  }
  .success-modal svg{
    padding: 12px;
  }
  .btn{
    width:50%;
    font-size:18px;
    padding: 8px;
  }
  .close{
    float: right;
    color:var(--text);
  }
</style>
</head>
<body>
  <header class="header">
    <p class="brand">AdeLovels</p>
    <nav>
     <a href ="cart.html"><li>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" color="#fff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg> <span class="num">0</span>
      </li></a>
    </nav>
  </header>
    <h1>Check Out our Products</h1>
    <div id="products"></div>
    <div class="success-modal-con">
    <div class="success-modal">
      <p class="close">x</p>
      <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="currentColor" color="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle-check-icon lucide-message-circle-check"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="m9 12 2 2 4-4"/></svg>
      <p>Added Successfully</p>
      <a href="cart.html" class="btn">View Cart</a>
    </div></div>
    <script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];

fetch('https://api.escuelajs.co/api/v1/products')
 .then(response => response.json())
   .then(data => {
  data.forEach(product => {
   const productEach = document.createElement('div');
   productEach.className ="product";
   productEach.innerHTML =`
   <div class="p-img-con">
   <img src="${product.images[0]}" alt="${product.name}" onerror="this.src='fallback.svg'; this.onerror=null;" class="p-img">
   </div>
   <p class="p-name">${product.title}</p>
   <!--<p class="p-details">${product.details}</p>-->
   <p class="p-price">$ ${product.price}</p>
   <button class="add-to-cart" onclick="addToCart(${product.id})">+ Add to cart</button>
   `;
   document.getElementById('products').appendChild(productEach);
  });
});

document.querySelector('.num').textContent = `${cart.length}`;
document.querySelector('.close').onclick = function() {
  document.querySelector('.success-modal-con').style.display="none";
}

function addToCart(id) {
  fetch('https://api.escuelajs.co/api/v1/products')
    .then(response => response.json())
    .then(products => {
      const product = products.find(p => p.id === id);
      const existingProduct = cart.find(item => item.id === id);
      
      if (existingProduct) {
        existingProduct.quantity++;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      
      localStorage.setItem('cart', JSON.stringify(cart));
      document.querySelector('.success-modal-con').style.display="flex";
    });
}
    </script>
</body>
</html>

**Accent**

- Off-White / Cream background: **#F8F4F0**  
- Dark text: **#1F1F1F**  
- Light grey for dividers: **#EDE9E4**  

**Extra**  
- Success / trust green: **#2E8B57**

### 3. Typography (Web-safe + Google Fonts)
**Headings**  
- Font: **Playfair Display** (serif)  
- Weights: 700 (Bold) & 400 (Regular)  
- Sizes:  
  - H1 (hero): 52–64px (desktop) / 36px (mobile)  
  - H2 (sections): 36px  
  - H3 (product titles): 24px  

**Body & UI text**  
- Font: **Inter** (sans-serif)  
- Weights: 400 (Regular), 500 (Medium), 600 (Semi-bold)  
- Base size: 17px  
-   
- Paragraphs: 17px  
- Buttons & nav: 15–16px,  uppercase for CTAs  

All text must be perfectly readable on mobile (minimum 16px body)
